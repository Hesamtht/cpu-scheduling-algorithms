<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1422"/>
      <stop offset="1" stop-color="#161e34"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.12" cy="0.1" r="0.5">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.9" cy="0.05" r="0.5">
      <stop offset="0" stop-color="#0ea5e9" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="320" rx="22" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="22" fill="url(#glow1)"/>
  <rect width="1200" height="320" rx="22" fill="url(#glow2)"/>
  <rect x="1" y="1" width="1198" height="318" rx="21" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- logo mark -->
  <g transform="translate(72,70)">
    <rect width="64" height="64" rx="16" fill="url(#brand)"/>
    <g transform="translate(18,18)" fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round">
      <rect x="4" y="4" width="20" height="20" rx="3"/>
      <path d="M11 0v4M17 0v4M11 24v4M17 24v4M0 11h4M0 17h4M24 11h4M24 17h4"/>
    </g>
  </g>

  <!-- title -->
  <text x="160" y="108" font-size="52" font-weight="800" fill="#f2f5fb" letter-spacing="-1">CPU Scheduler Lab</text>
  <text x="162" y="146" font-size="21" font-weight="500" fill="#aeb9cd">Visualize CPU scheduling, disk seeks &amp; deadlock avoidance — in your browser.</text>

  <!-- algorithm chips -->
  <g font-size="15" font-weight="600">
    <g transform="translate(162,178)">
      <rect width="64"  height="32" rx="16" fill="#6366f1" fill-opacity="0.16" stroke="#6366f1" stroke-opacity="0.4"/>
      <text x="32" y="21" text-anchor="middle" fill="#c7ccff">FCFS</text>
    </g>
    <g transform="translate(234,178)">
      <rect width="56"  height="32" rx="16" fill="#0ea5e9" fill-opacity="0.16" stroke="#0ea5e9" stroke-opacity="0.4"/>
      <text x="28" y="21" text-anchor="middle" fill="#b9e6fb">SJF</text>
    </g>
    <g transform="translate(298,178)">
      <rect width="64"  height="32" rx="16" fill="#10b981" fill-opacity="0.16" stroke="#10b981" stroke-opacity="0.4"/>
      <text x="32" y="21" text-anchor="middle" fill="#b6f0db">SRTF</text>
    </g>
    <g transform="translate(370,178)">
      <rect width="64"  height="32" rx="16" fill="#f59e0b" fill-opacity="0.16" stroke="#f59e0b" stroke-opacity="0.4"/>
      <text x="32" y="21" text-anchor="middle" fill="#f8d9a3">MLFQ</text>
    </g>
    <g transform="translate(442,178)">
      <rect width="116" height="32" rx="16" fill="#8b5cf6" fill-opacity="0.16" stroke="#8b5cf6" stroke-opacity="0.4"/>
      <text x="58" y="21" text-anchor="middle" fill="#d6c8fb">Round Robin</text>
    </g>
    <g transform="translate(566,178)">
      <rect width="92"  height="32" rx="16" fill="#ec4899" fill-opacity="0.16" stroke="#ec4899" stroke-opacity="0.4"/>
      <text x="46" y="21" text-anchor="middle" fill="#f8c4de">Banker's</text>
    </g>
    <g transform="translate(666,178)">
      <rect width="92"  height="32" rx="16" fill="#14b8a6" fill-opacity="0.16" stroke="#14b8a6" stroke-opacity="0.4"/>
      <text x="46" y="21" text-anchor="middle" fill="#a9efe5">Elevator</text>
    </g>
  </g>

  <!-- gantt motif -->
  <g transform="translate(162,238)">
    <rect width="876" height="34" rx="9" fill="#0a0f1c" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="2"   y="2" width="150" height="30" rx="7" fill="#6366f1"/>
    <rect x="154" y="2" width="96"  height="30" rx="7" fill="#0ea5e9"/>
    <rect x="252" y="2" width="120" height="30" rx="7" fill="#10b981"/>
    <rect x="374" y="2" width="78"  height="30" rx="7" fill="#f59e0b"/>
    <rect x="454" y="2" width="140" height="30" rx="7" fill="#8b5cf6"/>
    <rect x="596" y="2" width="104" height="30" rx="7" fill="#ec4899"/>
    <rect x="702" y="2" width="172" height="30" rx="7" fill="#14b8a6"/>
    <g fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle" opacity="0.95">
      <text x="77"  y="22">P1</text>
      <text x="202" y="22">P2</text>
      <text x="312" y="22">P3</text>
      <text x="413" y="22">P4</text>
      <text x="524" y="22">P5</text>
      <text x="648" y="22">P6</text>
      <text x="788" y="22">P7</text>
    </g>
  </g>

  <text x="1038" y="300" text-anchor="end" font-size="13" fill="#64708a">Django · vanilla JS · Chart.js</text>
</svg>
